# Acer Aspire One (Atom N270) fan control -- kernel-managed instead of BIOS.
#
# acerhdf loads with kernel mode OFF by default: it reads the temperature
# sensor but leaves the actual fan on/off decision to the BIOS. Switching to
# kernelmode=1 hands that decision to the kernel driver instead -- more
# responsive/tunable than the stock BIOS curve, and the standard, documented
# way to actually use this driver (see its own boot dmesg message).
#
# Deliberately NOT overriding fanon/fanoff here: acerhdf auto-detects the
# right thresholds from a per-model/per-BIOS-version DMI table (confirmed
# correct on this machine, model AOA110, BIOS v0.3310 -- fanon=60C,
# fanoff=53C, both sane vendor-calibrated values, not something to
# hand-tune without real thermal-load data backing a change).
options acerhdf kernelmode=1
